apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  init.sql: |
    -- Drop schema table if it exists to support clean cluster rebuild workflows
    DROP TABLE IF EXISTS employees;

    CREATE TABLE employees (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        role VARCHAR(100) NOT NULL,
        department VARCHAR(100) NOT NULL
    );

    -- Seed exactly 8 identical records matching your initial requirement framework
    INSERT INTO employees (name, role, department) VALUES
    ('Ashish Agarwal', 'Staff Engineer', 'Engineering'),
    ('Pranay Sharma', 'Team Lead', 'Infrastructure'),
    ('Ashish Prasad', 'Devops', 'Operations'),
    ('Ushma', 'Frontend Developer', 'Product'),
    ('Adarsh Singh', 'QA Automation Engineer', 'Quality Assurance'),
    ('Abhimanyu', 'BA', 'Management'),
    ('Amarjit Singh', 'Mentor', 'Education'),
    ('Prasun Guchhait', 'Mentor', 'Education');
