apiVersion: apps/v1
kind: Deployment
metadata:
  name: ashish-3162696-kubernetes-and-devops-advance-app
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ashish_3162696_kubernetes_and_devops_advance-api
  template:
    metadata:
      labels:
        app: ashish_3162696_kubernetes_and_devops_advance-api
    spec:
      containers:
        - name: ashish-3162696-kubernetes-and-devops-advance-app
          image: iamashish480/ashish_3162696_kubernetes_and_devops_advance-app:v4 # versionsing of the app
          imagePullPolicy: Always 
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "80Mi"
              cpu: "100m"
            limits:
              memory: "150Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
