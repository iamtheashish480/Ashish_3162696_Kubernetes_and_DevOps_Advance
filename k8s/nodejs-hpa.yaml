apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ashish-3162696-kubernetes-and-devops-advance-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ashish_3162696_kubernetes_and_devops_advance
  minReplicas: 4
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
